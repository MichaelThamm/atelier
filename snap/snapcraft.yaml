name: atelier
base: core24
title: Atelier
summary: Terminal UI for configuring Terraform modules
description: |
  Atelier presents a Terraform module's variables as an editable two-pane
  TUI. It produces a wrapper Terraform project — a main.tf calling the
  module via its git source, with only the values the user chose to set.
  Plan and apply run inside the TUI; the wrapper is independently runnable
  without Atelier installed.
license: Apache-2.0
source-code: https://github.com/MichaelThamm/atelier
issues: https://github.com/MichaelThamm/atelier/issues
adopt-info: atelier
confinement: classic
grade: stable

platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]

apps:
  atelier:
    command: bin/atelier

parts:
  atelier:
    plugin: go
    source: ./
    build-snaps:
      - go/latest/stable
    override-pull: |
      craftctl default
      # Derive version from git tag or commit.
      version="$(git describe --tags --always --dirty 2>/dev/null || echo "dev")"
      craftctl set version="${version}"
    override-build: |
      CGO_ENABLED=0 go build -o "${CRAFT_PART_INSTALL}/bin/atelier" ./cmd/atelier

# Example atelier.local.yaml — user-owned, wrapper-local presets.
#
# Atelier discovers this file by walking UP from the wrapper directory to the
# filesystem root (or $HOME). Placing it at a shared parent means every wrapper
# beneath it inherits these presets. For example, dropping this file at
# `tf-testing/atelier.local.yaml` makes the presets available to
# `tf-testing/cos/`, `tf-testing/cos-lite/`, etc.
#
# Atelier never reads any file from the upstream module repository; presets are
# entirely your own. See docs/SPEC.md §11 and docs/adr/0022-local-presets.md.

modules:
  # "." matches this wrapper's primary module regardless of its sub-path within
  # the upstream repo (e.g. terraform/cos). This is the ergonomic default for a
  # shared local file: you don't have to track the upstream path.
  - path: "."
    presets:
      - name: minimal
        description: "Single-unit dev deployment; TLS off; placeholder S3."
        sets:
          internal_tls: false
          s3_endpoint: null
          s3_access_key: "placeholder"
          s3_secret_key: "placeholder"
          alertmanager:
            units: 1
          grafana:
            units: 1
          loki_coordinator:
            units: 1
          loki_worker:
            backend_units: 1
            read_units: 1
            write_units: 1
          mimir_coordinator:
            units: 1
          mimir_worker:
            backend_units: 1
            read_units: 1
            write_units: 1
          tempo_coordinator:
            units: 1
          tempo_worker:
            compactor_units: 1
            distributor_units: 1
            ingester_units: 1
            metrics_generator_units: 1
            querier_units: 1
            query_frontend_units: 1

      - name: production
        description: "Multi-unit with TLS enabled."
        sets:
          internal_tls: true
          alertmanager:
            units: 3

  # You can also target a specific module by its upstream sub-path. An exact
  # match here takes precedence over the "." entry above for that module.
  #
  # - path: terraform/cos-lite
  #   presets:
  #     - name: ha
  #       sets:
  #         internal_tls: true

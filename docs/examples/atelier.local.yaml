# Example atelier.local.yaml — user-owned, wrapper-local presets.
#
# Atelier discovers this file by walking UP from the wrapper directory to the
# filesystem root (or $HOME). Placing it at a shared parent means every wrapper
# beneath it inherits these presets.

modules:
  # "." matches this wrapper's primary module regardless of its sub-path within
  # the upstream repo (e.g. terraform/cos). This is the ergonomic default for a
  # shared local file: you don't have to track the upstream path.
  - path: "."
    presets:
      - name: cos-s3
        description: "S3 information."
        sets:
          s3_endpoint: http://10.1.0.13:8333
          s3_access_key: "placeholder"
          s3_secret_key: "placeholder"
      - name: cos-units
        description: "Single-unit dev deployment."
        sets:
          alertmanager:
            units: 1
          grafana:
            units: 1
          loki_coordinator:
            units: 1
          loki_worker:
            backend_units: 1
            read_units: 1
            write_units: 1
          mimir_coordinator:
            units: 1
          mimir_worker:
            backend_units: 1
            read_units: 1
            write_units: 1
          tempo_coordinator:
            units: 1
          tempo_worker:
            compactor_units: 1
            distributor_units: 1
            ingester_units: 1
            metrics_generator_units: 1
            querier_units: 1
            query_frontend_units: 1

  # You can also target a specific module by its upstream sub-path. An exact
  # match here takes precedence over the "." entry above for that module.
  #
  # - path: terraform/cos-lite
  #   presets:
  #     - name: secure
  #       sets:
  #         internal_tls: true
